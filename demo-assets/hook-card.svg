<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="centerGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#7b2fff" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#7b2fff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#14141a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#centerGlow)"/>

  <!-- Faint matrix-rain texture (vertical line accents) -->
  <g opacity="0.06" font-family="JetBrains Mono, monospace" font-size="14" fill="#00f5ff">
    <text x="60"  y="200">01101000</text>
    <text x="60"  y="400">11000110</text>
    <text x="60"  y="600">10101110</text>
    <text x="60"  y="800">01010001</text>
    <text x="1820" y="200">01001011</text>
    <text x="1820" y="400">10110100</text>
    <text x="1820" y="600">11100101</text>
    <text x="1820" y="800">00110110</text>
  </g>

  <!-- Eight agent avatar dots arranged in arc above title -->
  <g>
    <!-- 8 small circles, 6 villager (orange) + 2 wolf (red highlight) -->
    <circle cx="660" cy="290" r="22" fill="#1a1a22" stroke="#ff6b3d" stroke-width="2"/>
    <text x="660" y="298" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" fill="#ff6b3d">1</text>

    <circle cx="730" cy="270" r="22" fill="#1a1a22" stroke="#ff6b3d" stroke-width="2"/>
    <text x="730" y="278" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" fill="#ff6b3d">2</text>

    <circle cx="800" cy="258" r="22" fill="#1a1a22" stroke="#c83e3e" stroke-width="2.5" filter="url(#softGlow)"/>
    <text x="800" y="266" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" fill="#c83e3e">3</text>

    <circle cx="870" cy="252" r="22" fill="#1a1a22" stroke="#ff6b3d" stroke-width="2"/>
    <text x="870" y="260" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" fill="#ff6b3d">4</text>

    <circle cx="940" cy="252" r="22" fill="#1a1a22" stroke="#ff6b3d" stroke-width="2"/>
    <text x="940" y="260" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" fill="#ff6b3d">5</text>

    <circle cx="1010" cy="258" r="22" fill="#1a1a22" stroke="#ff6b3d" stroke-width="2"/>
    <text x="1010" y="266" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" fill="#ff6b3d">6</text>

    <circle cx="1080" cy="270" r="22" fill="#1a1a22" stroke="#c83e3e" stroke-width="2.5" filter="url(#softGlow)"/>
    <text x="1080" y="278" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" fill="#c83e3e">7</text>

    <circle cx="1150" cy="290" r="22" fill="#1a1a22" stroke="#ff6b3d" stroke-width="2"/>
    <text x="1150" y="298" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" fill="#ff6b3d">8</text>
  </g>

  <!-- Title -->
  <text x="960" y="490" text-anchor="middle" font-family="Inter, sans-serif" font-size="110" font-weight="800" fill="#e6e6ec" letter-spacing="0.04em" filter="url(#glow)">AGENT</text>
  <text x="960" y="610" text-anchor="middle" font-family="Inter, sans-serif" font-size="110" font-weight="800" fill="#ff6b3d" letter-spacing="0.04em" filter="url(#glow)">WEREWOLF</text>

  <!-- Underline -->
  <rect x="700" y="640" width="520" height="3" fill="#7b2fff" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="960" y="730" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="28" fill="#e6e6ec">8 AI agents playing Werewolf together</text>

  <!-- Tagline -->
  <text x="960" y="780" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" fill="#8b8b95">Verifiable onchain · Gensyn AXL P2P · 0G Galileo</text>

  <!-- Stack chips at bottom -->
  <g font-family="JetBrains Mono, monospace" font-size="14" font-weight="600">
    <rect x="600" y="900" width="160" height="40" rx="20" fill="none" stroke="#00f5ff" stroke-width="1.5" opacity="0.9"/>
    <text x="680" y="925" text-anchor="middle" fill="#00f5ff">0G COMPUTE</text>

    <rect x="780" y="900" width="160" height="40" rx="20" fill="none" stroke="#7b2fff" stroke-width="1.5" opacity="0.9"/>
    <text x="860" y="925" text-anchor="middle" fill="#7b2fff">GENSYN AXL</text>

    <rect x="960" y="900" width="160" height="40" rx="20" fill="none" stroke="#ff6b3d" stroke-width="1.5" opacity="0.9"/>
    <text x="1040" y="925" text-anchor="middle" fill="#ff6b3d">0G CHAIN</text>

    <rect x="1140" y="900" width="180" height="40" rx="20" fill="none" stroke="#00f5ff" stroke-width="1.5" opacity="0.9"/>
    <text x="1230" y="925" text-anchor="middle" fill="#00f5ff">0G STORAGE</text>
  </g>

  <!-- Footer -->
  <text x="960" y="1010" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#5b5b65">github.com/Agent-Werewolf · ETHGlobal Open Agents 2026</text>
</svg>
